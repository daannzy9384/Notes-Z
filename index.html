<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes-Z - Download</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .botao-download {
      display: inline-block;
      padding: 15px 30px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
      margin-top: 20px;
      transition: background 0.3s;
      cursor: pointer;
    }
    .botao-download:active {
      background-color: #0056b3;
      transform: scale(0.98);
    }
  </style>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background: #fdfdfd;">
    
   <strong>Notes Z</strong> é um app simples e leve para anotar ideias,
    lembretes e textos do dia a dia.<br>
    Tudo o que você escreve é salvo automaticamente
    no seu celular, sem complicação.
  </p>

  <p>
    <a id="download-btn" href="#" class="botao-download">
      <i class="fas fa-download"></i> Baixar / atualizar o Notes Z
    </a>
  </p>

  <p>
    <a href="https://github.com/daannzy9384" target="_blank" style="color: #007bff; text-decoration: none;">Ver GitHub</a>
  </p>

  <footer style="margin-top: 50px; padding: 20px 0;">
    <div style="margin-bottom: 10px;">
      <a href="https://github.com/daannzy9384/Notes-Z" target="_blank" style="color: #333; font-size: 28px; text-decoration: none;">
        <i class="fab fa-github"></i>
      </a>
    </div>
    <p style="margin: 0; font-size: 14px; color: #666;">&copy; 2025 daannzy</p>
  </footer>

  <script>
    async function atualizarLinkDownload() {
      const repo = "https://github.com/daannzy9384/Notes-Z";
      const btn = document.getElementById('download-btn');

      try {
        const response = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
        const data = await response.json();

        const apkAsset = data.assets.find(asset =>
          asset.name.toLowerCase().endsWith('.apk')
        );

        if (apkAsset && btn) {
          btn.href = apkAsset.browser_download_url;
          btn.setAttribute("download", apkAsset.name);
        }
      } catch (error) {
        if (btn) {
          btn.href = "https://github.com/daannzy9384/Notes-Z/releases";
        }
      }
    }

    window.onload = atualizarLinkDownload;
  </script>

</body>
</html>
